services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nyx_garant
      POSTGRES_USER: nyx_garant
      POSTGRES_PASSWORD: nyx_garant_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nyx_garant -d nyx_garant"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./assets:/app/assets
      - ./backups:/app/backups
      - ./sessions:/app/sessions
    restart: unless-stopped

volumes:
  postgres_data:
